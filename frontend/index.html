<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion De Pacientes Para Clinica Dental Con Citas Y</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = {theme:{extend:{colors:{primary:"#3B82F6",secondary:"#1E40AF"}}}}</script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5);
                        display: flex; align-items: center; justify-content: center;
                        z-index: 50; padding: 1rem; }
        #app { display: none; height: 100vh; overflow: hidden; }
        aside { flex-shrink: 0; width: 13rem; overflow-y: auto;
                display: flex; flex-direction: column; }
        main  { flex: 1 1 0; overflow-y: auto; min-width: 0; }
        .tab-btn { color: #6B7280; }
        .tab-btn.active { background: #EFF6FF; color: #1D4ED8; font-weight: 600; }
        .fade-in { animation: fadeIn .15s ease-in; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    </style>
</head>
<body class="bg-gray-50">

<!-- ── Auth Overlay ────────────────────────────────────────────────── -->
<div id="auth-overlay">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

        <div id="login-form">
            <h2 class="text-2xl font-bold text-gray-900 mb-2 text-center">Gestion De Pacientes Para Clinica Dental Con Citas Y</h2>
            <p class="text-center text-gray-500 mb-6 text-sm">Inicia sesión para continuar</p>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="login-email" autocomplete="email"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none"
                    placeholder="tu@email.com">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                <input type="password" id="login-password" autocomplete="current-password" minlength="6"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none"
                    placeholder="••••••••">
            </div>
            <div id="login-error" class="hidden mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm"></div>
            <button onclick="handleLogin()"
                class="w-full bg-primary hover:bg-secondary text-white py-3 rounded-lg font-semibold transition-colors">
                Iniciar sesión
            </button>
            <p class="text-center mt-4 text-gray-600 text-sm">
                ¿No tienes cuenta?
                <a href="#" onclick="showRegister()" class="text-primary font-medium">Regístrate</a>
            </p>
        </div>

        <div id="register-form" class="hidden">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Crear cuenta</h2>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Usuario</label>
                <input type="text" id="register-username" autocomplete="username"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none"
                    placeholder="nombre_usuario">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="register-email" autocomplete="email"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none"
                    placeholder="tu@email.com">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                <input type="password" id="register-password" autocomplete="new-password" minlength="6"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none"
                    placeholder="Mínimo 6 caracteres">
            </div>
            <div id="reg-error" class="hidden mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm"></div>
            <button onclick="handleRegister()"
                class="w-full bg-primary hover:bg-secondary text-white py-3 rounded-lg font-semibold transition-colors">
                Crear cuenta
            </button>
            <p class="text-center mt-4 text-gray-600 text-sm">
                ¿Ya tienes cuenta?
                <a href="#" onclick="showLogin()" class="text-primary font-medium">Inicia sesión</a>
            </p>
        </div>

    </div>
</div>

<!-- ── App Shell ────────────────────────────────────────────────────── -->
<div id="app" class="flex">

    <!-- Sidebar -->
    <aside class="bg-white border-r border-gray-200">
        <div class="px-4 py-5 border-b border-gray-100">
            <h1 class="text-sm font-bold text-gray-900 leading-tight">Gestion De Pacientes Para Clinica Dental Con Citas Y</h1>
        </div>
        <nav class="p-3 flex-1">
            <button onclick="switchTab('pacientes')" id="tab-pacientes" class="tab-btn w-full text-left px-4 py-3 rounded-lg mb-1 font-medium transition-colors">Pacientes</button>
            <button onclick="switchTab('citas')" id="tab-citas" class="tab-btn w-full text-left px-4 py-3 rounded-lg mb-1 font-medium transition-colors">Citas</button>
            <button onclick="switchTab('tratamientos')" id="tab-tratamientos" class="tab-btn w-full text-left px-4 py-3 rounded-lg mb-1 font-medium transition-colors">Tratamientos</button>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <p id="user-email" class="text-xs text-gray-500 truncate mb-2"></p>
            <button onclick="logout()" class="w-full text-xs text-red-500 hover:text-red-700 font-medium">
                Cerrar sesión
            </button>
        </div>
    </aside>

    <!-- Main content -->
    <main class="p-8 bg-gray-50">

        <!-- Form card -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
            <h2 id="form-title" class="text-lg font-semibold text-gray-900 mb-4"></h2>
            <div id="form-fields" class="grid md:grid-cols-2 gap-4"></div>
            <div class="mt-4 flex gap-3">
                <button id="submit-btn" onclick="submitForm()"
                    class="bg-primary hover:bg-secondary text-white px-6 py-2.5 rounded-lg font-medium transition-colors">
                    + Crear
                </button>
                <button id="cancel-btn" onclick="cancelEdit()"
                    class="hidden bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2.5 rounded-lg font-medium transition-colors">
                    Cancelar
                </button>
            </div>
            <div id="create-error" class="hidden mt-3 p-3 bg-red-50 text-red-700 rounded-lg text-sm"></div>
        </div>

        <!-- List card -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h2 id="list-title" class="text-lg font-semibold text-gray-900"></h2>
                <button onclick="loadItems()" class="text-xs text-gray-400 hover:text-gray-600">↺ Actualizar</button>
            </div>
            <div class="px-4 py-3 border-b border-gray-100 flex gap-2 items-center">
                <input id="search-input" type="text" oninput="searchItems()"
                    placeholder="Buscar en todos los campos..."
                    class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-primary">
                <button onclick="downloadCSV()"
                    class="text-xs text-emerald-600 hover:text-emerald-700 font-medium border border-emerald-200 px-3 py-2 rounded-lg whitespace-nowrap">
                    ↓ CSV
                </button>
            </div>
            <div id="items-list" class="divide-y divide-gray-50"></div>
            <div id="pagination" class="px-6 py-3 border-t border-gray-100 flex items-center justify-between">
                <span id="page-info" class="text-sm text-gray-500"></span>
                <div class="flex gap-2">
                    <button id="prev-btn" onclick="prevPage()"
                        class="px-3 py-1 text-sm rounded border border-gray-200 hover:bg-gray-50 disabled:opacity-40">← Ant</button>
                    <button id="next-btn" onclick="nextPage()"
                        class="px-3 py-1 text-sm rounded border border-gray-200 hover:bg-gray-50 disabled:opacity-40">Sig →</button>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- ── Toast ─────────────────────────────────────────────────────────── -->
<div id="toast" class="fixed bottom-5 right-5 hidden z-40">
    <div id="toast-inner" class="px-5 py-3 rounded-xl shadow-lg text-white text-sm font-medium"></div>
</div>

<script>
// ── Config generada por ATLAS ─────────────────────────────────────────
const ENTITIES = {
    "pacientes": {
        "name": "Paciente",
        "plural": "pacientes",
        "path": "/items/",
        "tab_label": "Pacientes",
        "fields": [
            {
                "name": "nombre",
                "label": "Nombre",
                "type": "text",
                "required": true
            },
            {
                "name": "apellido",
                "label": "Apellido",
                "type": "text",
                "required": true
            },
            {
                "name": "fecha_nacimiento",
                "label": "Fecha de nacimiento",
                "type": "datetime-local",
                "required": true
            }
        ]
    },
    "citas": {
        "name": "Cita",
        "plural": "citas",
        "path": "/items/citas/",
        "tab_label": "Citas",
        "fields": [
            {
                "name": "fecha",
                "label": "Fecha",
                "type": "datetime-local",
                "required": true
            },
            {
                "name": "hora",
                "label": "Hora",
                "type": "time",
                "required": true
            },
            {
                "name": "paciente_id",
                "label": "Paciente",
                "type": "number",
                "required": true
            },
            {
                "name": "tratamiento",
                "label": "Tratamiento",
                "type": "text",
                "required": false
            }
        ]
    },
    "tratamientos": {
        "name": "Tratamiento",
        "plural": "tratamientos",
        "path": "/items/tratamientos/",
        "tab_label": "Tratamientos",
        "fields": [
            {
                "name": "descripcion",
                "label": "Descripción",
                "type": "text",
                "required": true
            }
        ]
    }
};

// ── Estado ────────────────────────────────────────────────────────────
const API_URL = window.location.origin;
let token = localStorage.getItem("token");
let currentTab = "pacientes";
let editingId = null;
const PAGE_SIZE = 20;
let allItems = [];
let filteredItems = [];
let currentPage = 0;

// ── Arranque ──────────────────────────────────────────────────────────
if (token) checkAuth();

// ── Auth ──────────────────────────────────────────────────────────────
function showLogin() {
    document.getElementById("login-form").classList.remove("hidden");
    document.getElementById("register-form").classList.add("hidden");
}
function showRegister() {
    document.getElementById("login-form").classList.add("hidden");
    document.getElementById("register-form").classList.remove("hidden");
}

async function handleLogin() {
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errEl    = document.getElementById("login-error");
    errEl.classList.add("hidden");
    if (!email || !password) { errEl.textContent = "Completa todos los campos"; errEl.classList.remove("hidden"); return; }
    try {
        const res  = await fetch(API_URL + "/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (data.access_token) {
            token = data.access_token;
            localStorage.setItem("token", token);
            checkAuth();
        } else {
            errEl.textContent = data.detail || "Credenciales incorrectas";
            errEl.classList.remove("hidden");
        }
    } catch(e) {
        errEl.textContent = "Error de conexión";
        errEl.classList.remove("hidden");
    }
}

async function handleRegister() {
    const username = document.getElementById("register-username").value.trim();
    const email    = document.getElementById("register-email").value.trim();
    const password = document.getElementById("register-password").value;
    const errEl    = document.getElementById("reg-error");
    errEl.classList.add("hidden");
    if (!username || !email || !password) { errEl.textContent = "Completa todos los campos"; errEl.classList.remove("hidden"); return; }
    try {
        const res  = await fetch(API_URL + "/auth/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, email, password})
        });
        const data = await res.json();
        if (data.id || data.email) {
            showToast("Cuenta creada. Inicia sesión.");
            showLogin();
        } else {
            errEl.textContent = data.detail || JSON.stringify(data);
            errEl.classList.remove("hidden");
        }
    } catch(e) {
        errEl.textContent = "Error de conexión";
        errEl.classList.remove("hidden");
    }
}

async function checkAuth() {
    try {
        const res = await fetch(API_URL + "/auth/me", {
            headers: {"Authorization": "Bearer " + token}
        });
        if (res.ok) {
            const user = await res.json();
            document.getElementById("user-email").textContent = user.email;
            document.getElementById("auth-overlay").style.display = "none";
            document.getElementById("app").style.display = "flex";
            switchTab(currentTab);
        } else {
            localStorage.removeItem("token");
            token = null;
        }
    } catch(e) {}
}

function logout() {
    localStorage.removeItem("token");
    token = null;
    document.getElementById("app").style.display = "none";
    document.getElementById("auth-overlay").style.display = "flex";
    showLogin();
}

// ── Tabs ───────────────────────────────────────────────────────────────
function switchTab(key) {
    currentTab = key;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    const btn = document.getElementById("tab-" + key);
    if (btn) btn.classList.add("active");
    renderForm();
    loadItems();
}

// ── Render form dinámico ───────────────────────────────────────────────
function renderForm(item = null) {
    const entity = ENTITIES[currentTab];
    editingId = item ? item.id : null;
    const isEdit = editingId !== null;
    document.getElementById("form-title").textContent = (isEdit ? "Editar " : "Crear ") + entity.name;
    document.getElementById("create-error").classList.add("hidden");
    document.getElementById("submit-btn").textContent = isEdit ? "Guardar cambios" : "+ Crear";
    document.getElementById("cancel-btn").classList.toggle("hidden", !isEdit);
    document.getElementById("form-fields").innerHTML = entity.fields.map(f => `
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">${f.label}</label>
            <input type="${f.type}" id="f-${f.name}" ${f.required && !isEdit ? "required" : ""}
                class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm"
                placeholder="${f.label}"
                value="${item ? (item[f.name] ?? "") : ""}">
        </div>
    `).join("");
}

function cancelEdit() {
    editingId = null;
    renderForm();
}

// ── CRUD ───────────────────────────────────────────────────────────────
async function loadItems() {
    const entity = ENTITIES[currentTab];
    document.getElementById("list-title").textContent = "Lista de " + entity.tab_label;
    const searchEl = document.getElementById("search-input");
    if (searchEl) searchEl.value = "";
    document.getElementById("items-list").innerHTML =
        '<div class="px-6 py-8 text-center text-gray-400 text-sm">Cargando...</div>';
    try {
        const res = await fetch(API_URL + entity.path, {
            headers: {"Authorization": "Bearer " + token}
        });
        if (res.status === 401) { logout(); return; }
        allItems = await res.json();
        if (!Array.isArray(allItems)) allItems = [];
        filteredItems = [...allItems];
        currentPage = 0;
        renderPage();
    } catch(e) {
        document.getElementById("items-list").innerHTML =
            '<div class="px-6 py-8 text-center text-red-400 text-sm">Error de conexión</div>';
    }
}

function searchItems() {
    const q = document.getElementById("search-input").value.toLowerCase();
    filteredItems = q
        ? allItems.filter(item => Object.values(item).some(v => String(v ?? "").toLowerCase().includes(q)))
        : [...allItems];
    currentPage = 0;
    renderPage();
}

function renderPage() {
    const entity = ENTITIES[currentTab];
    const start  = currentPage * PAGE_SIZE;
    const page   = filteredItems.slice(start, start + PAGE_SIZE);
    const list   = document.getElementById("items-list");
    if (filteredItems.length === 0) {
        list.innerHTML = '<div class="px-6 py-10 text-center text-gray-400 text-sm">Sin registros. ¡Crea el primero!</div>';
        document.getElementById("page-info").textContent = "";
        document.getElementById("prev-btn").disabled = true;
        document.getElementById("next-btn").disabled = true;
        return;
    }
    list.innerHTML = page.map(item => {
        const cols = entity.fields.slice(0, 4).map(f =>
            `<span class="text-gray-600 text-sm"><span class="font-medium text-gray-800">${f.label}:</span> ${item[f.name] ?? "—"}</span>`
        ).join('<span class="text-gray-300 mx-2">|</span>');
        const itemJson = encodeURIComponent(JSON.stringify(item));
        return `<div class="fade-in px-6 py-4 flex items-center justify-between hover:bg-gray-50">
            <div class="flex flex-wrap gap-x-4 gap-y-1">${cols}</div>
            <div class="ml-4 flex gap-3 shrink-0">
                <button onclick="editItem(decodeURIComponent('${itemJson}'))"
                    class="text-xs text-blue-500 hover:text-blue-700 font-medium">Editar</button>
                <button onclick="deleteItem('${entity.path}', ${item.id})"
                    class="text-xs text-red-400 hover:text-red-600 font-medium">Eliminar</button>
            </div>
        </div>`;
    }).join("");
    const total = filteredItems.length;
    const pages = Math.ceil(total / PAGE_SIZE);
    document.getElementById("page-info").textContent =
        `${start + 1}–${Math.min(start + PAGE_SIZE, total)} de ${total}`;
    document.getElementById("prev-btn").disabled = currentPage === 0;
    document.getElementById("next-btn").disabled = currentPage >= pages - 1;
}

function prevPage() { if (currentPage > 0) { currentPage--; renderPage(); } }
function nextPage() {
    if (currentPage < Math.ceil(filteredItems.length / PAGE_SIZE) - 1) { currentPage++; renderPage(); }
}

async function downloadCSV() {
    const entity = ENTITIES[currentTab];
    try {
        const res = await fetch(`${API_URL}/export/${entity.plural}/csv`, {
            headers: {"Authorization": "Bearer " + token}
        });
        if (res.status === 404) { showToast("Export no disponible para " + entity.tab_label, true); return; }
        if (!res.ok) { showToast("Error al exportar (" + res.status + ")", true); return; }
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = entity.plural + ".csv"; a.click();
        URL.revokeObjectURL(url);
        showToast("CSV descargado: " + entity.plural + ".csv");
    } catch(e) { showToast("Error de conexión al exportar", true); }
}

function editItem(jsonStr) {
    try {
        const item = JSON.parse(jsonStr);
        renderForm(item);
        document.getElementById("form-fields").scrollIntoView({behavior: "smooth", block: "start"});
    } catch(e) { console.error("editItem parse error", e); }
}

function submitForm() {
    if (editingId !== null) { updateItem(); } else { createItem(); }
}

async function createItem() {
    const entity  = ENTITIES[currentTab];
    const errEl   = document.getElementById("create-error");
    const payload = {};
    errEl.classList.add("hidden");
    for (const f of entity.fields) {
        const el = document.getElementById("f-" + f.name);
        if (!el) continue;
        payload[f.name] = (f.type === "number") ? (Number(el.value) || 0) : el.value;
    }
    try {
        const res = await fetch(API_URL + entity.path, {
            method: "POST",
            headers: {"Content-Type": "application/json", "Authorization": "Bearer " + token},
            body: JSON.stringify(payload)
        });
        if (res.ok) {
            entity.fields.forEach(f => { const el = document.getElementById("f-" + f.name); if(el) el.value = ""; });
            loadItems();
            showToast(entity.name + " creado");
        } else {
            const err = await res.json();
            errEl.textContent = err.detail || JSON.stringify(err);
            errEl.classList.remove("hidden");
        }
    } catch(e) { errEl.textContent = "Error de conexión"; errEl.classList.remove("hidden"); }
}

async function updateItem() {
    const entity  = ENTITIES[currentTab];
    const errEl   = document.getElementById("create-error");
    const payload = {};
    errEl.classList.add("hidden");
    for (const f of entity.fields) {
        const el = document.getElementById("f-" + f.name);
        if (!el || el.value === "") continue;
        payload[f.name] = (f.type === "number") ? (Number(el.value) || 0) : el.value;
    }
    try {
        const res = await fetch(API_URL + entity.path + editingId, {
            method: "PUT",
            headers: {"Content-Type": "application/json", "Authorization": "Bearer " + token},
            body: JSON.stringify(payload)
        });
        if (res.ok) {
            editingId = null;
            renderForm();
            loadItems();
            showToast(entity.name + " actualizado");
        } else {
            const err = await res.json();
            errEl.textContent = err.detail || JSON.stringify(err);
            errEl.classList.remove("hidden");
        }
    } catch(e) { errEl.textContent = "Error de conexión"; errEl.classList.remove("hidden"); }
}

async function deleteItem(path, id) {
    if (!confirm("¿Eliminar este registro?")) return;
    if (editingId === id) { editingId = null; renderForm(); }
    try {
        await fetch(API_URL + path + id, {
            method: "DELETE",
            headers: {"Authorization": "Bearer " + token}
        });
        loadItems();
        showToast("Eliminado", true);
    } catch(e) {}
}

// ── Toast ──────────────────────────────────────────────────────────────
function showToast(msg, warn = false) {
    const t  = document.getElementById("toast");
    const ti = document.getElementById("toast-inner");
    ti.textContent = msg;
    ti.className = (warn ? "bg-yellow-500" : "bg-green-600") +
                   " px-5 py-3 rounded-xl shadow-lg text-white text-sm font-medium";
    t.classList.remove("hidden");
    setTimeout(() => t.classList.add("hidden"), 2800);
}
</script>
</body>
</html>
